<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI Chat</title>
<style>
    body { margin: 0; font-family: system-ui, Arial; background: radial-gradient(circle at top, #0d0d0d99, #090909f1); color: white; height: 100vh; display: flex; overflow: hidden; }
    #sidebar { width: 210px; background: rgba(0,0,0,0.45); backdrop-filter: blur(10px); border-right: 1px solid rgba(255,255,255,0.08); display: flex; flex-direction: column; }
    #sidebarHeader { padding: 10px; font-size: 1.2em; font-weight: bold; text-align: center; }
    #chats { flex: 1; overflow-y: auto; }
    .chatItem { padding: 8px; cursor: pointer; font-size: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; }
    .chatItem.active { background: rgba(43,92,255,0.4); }
    #addChatBtn { margin: 8px; padding: 10px; border: none; border-radius: 8px; background: #2b5cff; color: white; cursor: pointer; }
    #main { flex: 1; display: flex; flex-direction: column; }
    #chat { flex: 1; overflow-y: auto; padding: 12px; }
    .msg { display: block; width: fit-content; max-width: 70%; padding: 10px 14px; margin: 6px 0; border-radius: 12px; white-space: pre-wrap; }
    .user { margin-left: auto; background: #2b5cff; }
    .ai { background: rgba(255,255,255,0.08); }
    .fileBox { margin-top: 6px; padding: 6px; background: rgba(255,255,255,0.05); border-radius: 8px; }
    img.preview { max-width: 200px; border-radius: 10px; }
    #bar { display: flex; gap: 6px; padding: 8px; background: rgba(0,0,0,0.4); align-items: center; }
    
    .model-wrapper { display: flex; align-items: center; background: rgba(255,255,255,0.08); border-radius: 8px; height: 30px; border: 1px solid rgba(255,255,255,0.1); }
    #model-display { padding: 0 10px; font-size: 13px; pointer-events: none; white-space: nowrap; min-width: 40px; }
    #model-select { background: transparent; color: white; border: none; height: 30px; cursor: pointer; outline: none; }
    
    input { height: 30px; border-radius: 8px; border: none; color: white; flex: 1; background: rgba(255,255,255,0.08); padding: 0 8px; }
    button { height: 30px; border-radius: 8px; border: none; color: white; background: #2b5cff; cursor: pointer; padding: 0 10px; }
    option { background: #121212}
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebarHeader">Chats</div>
  <div id="chats"></div>
  <button id="addChatBtn">+ New Chat</button>
</div>

<div id="main">
  <div id="chat"></div>
  <div id="bar">
    <div class="model-wrapper">
        <div id="model-display">Pro</div><img alt="" class="flipper-caret" src="https://assets.msn.com/staticsb/statics/latest/fluent-icons/caret_left_24_filled.svg" style="width: 12.5px; margin-left: -20px; margin-right: 10px; transform: rotate(-90deg); filter: brightness(0) invert(1);">
        <select id="model-select" style="margin-left: -60px; opacity: 0; width: 55px;">
<option value="lite">Lite (Basic &amp; Instant)</option>
<option value="fast">Fast (Gemma 7B - Good & Quick)</option>
<option value="pro" selected>Pro (Best Overall balance)</option>
<option value="ultra">Ultra (Advanced Reasoning - Might take a while)</option>
        </select>
    </div>
    <input id="input" placeholder="Ask me anything...">
    <input type="file" id="fileInput" accept="image/*" multiple hidden>
    <button id="fileBtn">📎</button>
    <button id="micBtn">🎤</button>
    <button id="sendBtn">Send</button>
  </div>
</div>

<script>
    const select = document.getElementById('model-select');
    const display = document.getElementById('model-display');

    // FORCE UPDATE
    select.addEventListener('change', (e) => {
        const text = e.target.options[e.target.selectedIndex].text;
        display.innerText = text.split('(')[0].trim();
        console.log("Updated to:", display.innerText);
    });

    // Remainder of your app logic
    const WORKER_URL = "https://ai.raybod8765.workers.dev";
    let chats = JSON.parse(localStorage.getItem("chats") || "[]");
    let currentChat = null;
    let attachments = [];

    function save() { localStorage.setItem("chats", JSON.stringify(chats)); }
    function createChat() { const id = Date.now().toString(); const chat = { id, title: "New Chat", messages: [] }; chats.push(chat); save(); return chat; }

    async function send() {
      const input = document.getElementById("input");
      const text = input.value.trim();
      const mode = document.getElementById("model-select").value;
      if (!text && attachments.length === 0) return;
      input.value = "";
      if (!currentChat) createChat();
      
      const chat = chats.find(c => c.id === currentChat);
      chat.messages.push({ role:"user", text, files: attachments });
      // ... (Rest of your send logic remains exactly the same)
      const res = await fetch(WORKER_URL, { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ message: text, mode, files: attachments }) });
      const data = await res.json();
      chat.messages.push({ role:"ai", text: data.reply });
      save();
    }
    
    // Initial Load
    display.innerText = select.options[select.selectedIndex].text.split('(')[0].trim();
</script>
</body>
</html>
