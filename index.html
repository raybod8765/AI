<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI Chat</title>

<style>
body {
  margin: 0;
  font-family: system-ui, Arial;
  background: radial-gradient(circle at top, #0d0d0d99, #090909f1);
  color: white;
  height: 100vh;
  display: flex;
  overflow: hidden;
}

/* SIDEBAR */
#sidebar {
  width: 210px;
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(10px);
  border-right: 1px solid rgba(255,255,255,0.08);
  display: flex;
  flex-direction: column;
}

#sidebarHeader {
  padding: 10px;
  font-size: 1.2em;
  font-weight: bold;
  text-align: center;
}

#search {
  margin: 6px;
  padding: 6px;
  font-size: 12px;
  border-radius: 6px;
  border: none;
  background: rgba(255,255,255,0.08);
  color: white;
  max-height: 30px !important;
}

#chats {
  flex: 1;
  overflow-y: auto;
}

.chatItem {
  padding: 8px;
  cursor: pointer;
  font-size: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.chatItem.active {
  background: rgba(43,92,255,0.4);
}

.delBtn {
  color: red;
  cursor: pointer;
}

/* ADD BUTTON */
#addChatBtn {
  margin: 8px;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #2b5cff;
  color: white;
  cursor: pointer;
}

/* MAIN */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

#banner {
  text-align: center;
  padding: 10px;
  font-size: 14px;
  background: rgba(0,0,0,0.45);
}

/* CHAT */
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
}

/* MSG */
.msg {
  display: block;
  width: fit-content;
  max-width: 70%;
  padding: 10px 14px;
  margin: 6px 0;
  border-radius: 12px;
  line-height: 1.4;
  white-space: pre-wrap;
}

.user { margin-left: auto; background: #2b5cff; }
.ai { background: rgba(255,255,255,0.08); }

/* BAR */
#bar {
  display: flex;
  gap: 8px;
  padding: 8px;
  background: rgba(0,0,0,0.4);
  align-items: center;
}

input, select, button {
  height: 30px !important;
  border-radius: 8px;
  border: none;
  color: white;
}

input {
  flex: 1;
  background: rgba(255,255,255,0.08);
  padding: 0 8px;
}

select {
  background: rgba(255,255,255,0.08);
}

button {
  background: #2b5cff;
  cursor: pointer;
}

option { color: #000; }

/* DELETE POPUP */
#modal {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.6);
  display: none;
  align-items: center;
  justify-content: center;
}

#modalBox {
  background: #111;
  padding: 20px;
  border-radius: 12px;
  text-align: center;
}

#modalBox button {
  margin: 5px;
}
</style>
</head>

<body>

<div id="sidebar">
  <div id="sidebarHeader">Chats</div>
  <input id="search" placeholder="Search chats...">
  <div id="chats"></div>
  <button id="addChatBtn">+ New Chat</button>
</div>

<div id="main">
  <div id="banner">AI Chat</div>
  <div id="chat"></div>

  <div id="bar">
    <select id="mode">
      <option value="fast">Fast</option>
      <option value="pro" selected>Pro</option>
    </select>

    <input id="input" placeholder="Ask me anything...">
    <button id="sendBtn">Send</button>
  </div>
</div>

<!-- DELETE MODAL -->
<div id="modal">
  <div id="modalBox">
    <p>Delete this chat?</p>
    <button id="cancelDel">Cancel</button>
    <button id="confirmDel">Delete</button>
  </div>
</div>

<script>

const WORKER_URL = "https://ai.raybod8765.workers.dev";

let chats = JSON.parse(localStorage.getItem("chats") || "[]");
let currentChat = null;
let deleteTarget = null;

/* SAVE */
function save() {
  localStorage.setItem("chats", JSON.stringify(chats));
}

function scrollToBottom() {
  const box = document.getElementById("chat");
  box.scrollTop = box.scrollHeight;
}

/* MARKDOWN */
function md(t) {
  return String(t)
    .replace(/```([\s\S]*?)```/g, "<pre><code>$1</code></pre>")
    .replace(/`([^`]+)`/g, "<code>$1</code>")
    .replace(/\*\*(.*?)\*\*/g, "<b>$1</b>")
    .replace(/\n/g, "<br>");
}

/* MEMORY */
function memory(chat) {
  return chat.messages.slice(-25);
}

/* CREATE CHAT */
function createChat(title = "New Chat") {
  const id = Date.now().toString();
  chats.push({ id, title, messages: [] });
  save();
  switchChat(id);
  render();
}

/* RENDER SIDEBAR */
function render() {
  const box = document.getElementById("chats");
  box.innerHTML = "";

  chats.forEach(c => {
    const div = document.createElement("div");
    div.className = "chatItem" + (c.id === currentChat ? " active" : "");

    div.innerHTML = `
      <span>${c.title}</span>
      <span class="delBtn" data-id="${c.id}">✖</span>
    `;

    div.onclick = (e) => {
      if (e.target.classList.contains("delBtn")) {
        deleteTarget = c.id;
        document.getElementById("modal").style.display = "flex";
        return;
      }
      switchChat(c.id);
    };

    box.appendChild(div);
  });
}

/* SWITCH */
function switchChat(id) {
  currentChat = id;
  const chat = chats.find(c => c.id === id);

  const box = document.getElementById("chat");
  box.innerHTML = "";

  chat.messages.forEach(m => {
    const div = document.createElement("div");
    div.className = "msg " + m.role;
    div.innerHTML = md(m.text);
    box.appendChild(div);
  });

  render();
scrollToBottom();
}

/* TYPE EFFECT */
function type(el, text, speed = 20) {
  el.innerHTML = "";

  let i = 0;
  let buffer = "";

function step() {
  if (i < text.length) {
    buffer += text[i];

    el.innerHTML = md(buffer);

    scrollToBottom(); // ⭐ keep chat pinned to bottom

    i++;
    setTimeout(step, speed);
  }
}

  step();
}

/* AI TITLE */
async function generateTitle(text, reply, mode) {
  try {
    const res = await fetch(WORKER_URL, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        message: `Make a short chat title (max 5 words):\nUser: ${text}\nAI: ${reply}`,
        mode
      })
    });

    const data = await res.json();
    return (data.reply || "Chat")
      .replace(/[#*`\n"]/g,"")
      .trim()
      .slice(0, 30);

  } catch {
    return "Chat";
  }
}

/* SEND */
async function send() {

  const input = document.getElementById("input");
  const text = input.value.trim();
  const mode = document.getElementById("mode").value;

  if (!text) return;
  input.value = "";

  if (!currentChat) createChat();

  const chat = chats.find(c => c.id === currentChat);

  chat.messages.push({ role: "user", text });

  const box = document.getElementById("chat");

  const u = document.createElement("div");
  u.className = "msg user";
  u.innerHTML = md(text);
  box.appendChild(u);
scrollToBottom();

  const ai = document.createElement("div");
  ai.className = "msg ai";
  ai.innerText = "•••";
  box.appendChild(ai);
scrollToBottom();

  try {
    const res = await fetch(WORKER_URL, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        message: text,
        mode,
        memory: memory(chat)
      })
    });

    const data = await res.json();
    const reply = data.reply || "No response";

    chat.messages.push({ role: "ai", text: reply });

    type(ai, reply);

    /* AUTO TITLE */
    if (chat.title === "New Chat") {
      chat.title = await generateTitle(text, reply, mode);
    }

    save();
    render();

  } catch (e) {
    ai.innerText = "Error: " + e.message;
  }
}

/* DELETE */
document.getElementById("confirmDel").onclick = () => {
  chats = chats.filter(c => c.id !== deleteTarget);
  deleteTarget = null;
  document.getElementById("modal").style.display = "none";
  save();
  render();
};

document.getElementById("cancelDel").onclick = () => {
  deleteTarget = null;
  document.getElementById("modal").style.display = "none";
};

/* EVENTS */
document.getElementById("sendBtn").onclick = send;
document.getElementById("input").addEventListener("keydown", e => {
  if (e.key === "Enter") send();
});

document.getElementById("addChatBtn").onclick = () => createChat();

if (chats.length) {
  switchChat(chats[0].id);
  scrollToBottom();
}
else createChat();

render();
window.addEventListener("load", () => {
  setTimeout(scrollToBottom, 50);
});

</script>

</body>
</html>
