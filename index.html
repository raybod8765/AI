<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI Chat</title>

<style>
body {
  margin: 0;
  font-family: system-ui, Arial;
  background: radial-gradient(circle at top, #0d0d0d99, #090909f1);
  color: white;
  height: 100vh;
  display: flex;
  overflow: hidden;
}

#sidebar {
  width: 210px;
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(10px);
  border-right: 1px solid rgba(255,255,255,0.08);
  display: flex;
  flex-direction: column;
}

#sidebarHeader {
  padding: 10px;
  font-size: 1.2em;
  font-weight: bold;
  text-align: center;
}

#search {
  margin: 6px;
  padding: 6px;
  font-size: 12px;
  border-radius: 6px;
  border: none;
  background: rgba(255,255,255,0.08);
  color: white;
  max-height: 30px !important;
}

#chats {
  flex: 1;
  overflow-y: auto;
}

.chatItem {
  padding: 8px;
  cursor: pointer;
  font-size: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  display: flex;
  justify-content: space-between;
}

.chatItem.active {
  background: rgba(43,92,255,0.4);
}

.delBtn { color: red; cursor: pointer; }

#addChatBtn {
  margin: 8px;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #2b5cff;
  color: white;
  cursor: pointer;
}

#main { flex: 1; display: flex; flex-direction: column; }

#banner {
  text-align: center;
  padding: 10px;
  font-size: 14px;
  background: rgba(0,0,0,0.45);
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
}

.msg {
  display: block;
  width: fit-content;
  max-width: 70%;
  padding: 10px 14px;
  margin: 6px 0;
  border-radius: 12px;
  white-space: pre-wrap;
}

.user { margin-left: auto; background: #2b5cff; }
.ai { background: rgba(255,255,255,0.08); }

#bar {
  display: flex;
  gap: 8px;
  padding: 8px;
  background: rgba(0,0,0,0.4);
}

input, select, button {
  height: 30px !important;
  border-radius: 8px;
  border: none;
  color: white;
}

input { flex: 1; background: rgba(255,255,255,0.08); padding: 0 8px; }
select { background: rgba(255,255,255,0.08); }
button { background: #2b5cff; cursor: pointer; }

option { color:#000; }

a{
  color:#7aa2ff;
}

pre{
  background:#00000055;
  padding:10px;
  border-radius:10px;
  overflow:auto;
}

code{
  background:#00000055;
  padding:2px 5px;
  border-radius:5px;
}

h1,h2,h3,h4,h5,h6{
  margin:8px 0;
}
</style>
</head>

<body>

<div id="sidebar">
  <div id="sidebarHeader">Chats</div>
  <div id="chats"></div>
  <button id="addChatBtn">+ New Chat</button>
</div>

<div id="main">
  <div id="banner">AI Chat</div>
  <div id="chat"></div>

  <div id="bar">
    <select id="mode">
      <option value="lite">Lite (Gemma 1)</option>
      <option value="fast">Fast (Gemma 2)</option>
      <option value="pro">Pro (Gemma 3)</option>  
      <option value="ultra" selected>Ultra (Llama 3.1)</option>    
    </select>

    <input id="input" placeholder="Ask me anything...">
    <button id="sendBtn">Send</button>
  </div>
</div>

<script>

const WORKER_URL = "https://ai.raybod8765.workers.dev";

let chats = JSON.parse(localStorage.getItem("chats") || "[]");
let currentChat = null;

/* ---------- STORAGE HELPERS ---------- */
function save() {
  localStorage.setItem("chats", JSON.stringify(chats));
  localStorage.setItem("lastChatId", currentChat);
}

/* ---------- HASH SYNC ---------- */
function setHash(id) {
  location.hash = id;
}

/* ---------- INIT ---------- */
function init() {

  const hashId = location.hash.replace("#", "");
  const lastId = localStorage.getItem("lastChatId");

  // priority: hash → last session → new chat
  let target = chats.find(c => c.id === hashId)
            || chats.find(c => c.id === lastId);

  if (!target) {
    target = createChat();
  }

  switchChat(target.id);
}

/* ---------- CHAT ---------- */
function createChat() {
  const id = Date.now().toString();
  const chat = { id, title: "New Chat", messages: [] };
  chats.push(chat);
  save();
  render();
  return chat;
}

function switchChat(id) {
  currentChat = id;
  setHash(id);
  save();

  const chat = chats.find(c => c.id === id);
  const box = document.getElementById("chat");
  box.innerHTML = "";

  chat.messages.forEach(m => {
    const div = document.createElement("div");
    div.className = "msg " + m.role;
    div.innerHTML = md(m.text);
    box.appendChild(div);
  });

  render();
  scrollBottom();
}

/* ---------- RENDER ---------- */
function render() {
  const box = document.getElementById("chats");
  box.innerHTML = "";

  chats.forEach(c => {
    const div = document.createElement("div");
    div.className = "chatItem" + (c.id === currentChat ? " active" : "");

    div.innerHTML = `
      <span>${c.title}</span>
      <span class="delBtn">✖</span>
    `;

    div.onclick = (e) => {
      if (e.target.classList.contains("delBtn")) {
        chats = chats.filter(x => x.id !== c.id);
        save();
        render();
        return;
      }
      switchChat(c.id);
    };

    box.appendChild(div);
  });
}

/* ---------- SCROLL ---------- */
function scrollBottom() {
  const c = document.getElementById("chat");
  c.scrollTop = c.scrollHeight;
}

/* ---------- MARKDOWN ---------- */
/* ---------- MARKDOWN ---------- */
function md(text) {

  text = String(text);

  // escape html
  text = text
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");

  /* CODE BLOCKS */
  text = text.replace(
    /```([\s\S]*?)```/g,
    '<pre><code>$1</code></pre>'
  );

  /* INLINE CODE */
  text = text.replace(
    /`([^`]+)`/g,
    '<code>$1</code>'
  );

  /* HEADINGS */
  text = text.replace(/^###### (.*)$/gm, '<h6>$1</h6>');
  text = text.replace(/^##### (.*)$/gm, '<h5>$1</h5>');
  text = text.replace(/^#### (.*)$/gm, '<h4>$1</h4>');
  text = text.replace(/^### (.*)$/gm, '<h3>$1</h3>');
  text = text.replace(/^## (.*)$/gm, '<h2>$1</h2>');
  text = text.replace(/^# (.*)$/gm, '<h1>$1</h1>');

  /* LINKS */
  text = text.replace(
    /\[([^\]]+)\]\(([^)]+)\)/g,
    '<a href="$2" target="_blank">$1</a>'
  );

  /* BOLD ITALIC */
  text = text.replace(
    /\*\*\*(.*?)\*\*\*/g,
    '<b><i>$1</i></b>'
  );

  /* BOLD */
  text = text.replace(
    /\*\*(.*?)\*\*/g,
    '<b>$1</b>'
  );

  /* ITALIC WITH * */
  text = text.replace(
    /\*(.*?)\*/g,
    '<i>$1</i>'
  );

  /* ITALIC WITH _ */
  text = text.replace(
    /_(.*?)_/g,
    '<i>$1</i>'
  );

  /* LINE BREAKS */
  text = text.replace(/\n/g, "<br>");

  return text;
}

/* ---------- TYPE MARKDOWN ---------- */
function typeMarkdown(el, text, speed = 8) {

  let i = 0;
  let current = "";

  function step() {

    if (i < text.length) {

      current += text[i];

      // render markdown WHILE typing
      el.innerHTML = md(current);

      scrollBottom();

      i++;

      setTimeout(step, speed);

    } else {

      // final clean render
      el.innerHTML = md(text);

      scrollBottom();

    }

  }

  step();
}

/* ---------- SEND ---------- */
async function send() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  const mode = document.getElementById("mode").value;

  if (!text) return;
  input.value = "";

  if (!currentChat) createChat();

  const chat = chats.find(c => c.id === currentChat);

  chat.messages.push({ role: "user", text });

  const box = document.getElementById("chat");

  const u = document.createElement("div");
  u.className = "msg user";
  u.innerHTML = md(text);
  box.appendChild(u);

  const ai = document.createElement("div");
  ai.className = "msg ai";
  ai.innerText = "•••";
  box.appendChild(ai);

  scrollBottom();

  const res = await fetch(WORKER_URL, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      message: text,
      mode,
      memory: chat.messages.slice(-20)
    })
  });

  const data = await res.json();
  const reply = data.reply || "No response";

  typeMarkdown(ai, reply);
  chat.messages.push({ role: "ai", text: reply });

  // FIX TITLE (NO "SURE..." garbage)
  if (chat.title === "New Chat") {
    let title = text.split(" ").slice(0, 4).join(" ");
    chat.title = title.replace(/[^a-zA-Z0-9 ]/g, "").trim();
  }

  save();
  render();
  scrollBottom();
}

/* ---------- EVENTS ---------- */
document.getElementById("sendBtn").onclick = send;
document.getElementById("input").addEventListener("keydown", e => {
  if (e.key === "Enter") send();
});

document.getElementById("addChatBtn").onclick = () => {
  const c = createChat();
  switchChat(c.id);
};

window.addEventListener("hashchange", () => {
  const id = location.hash.replace("#", "");
  if (id) switchChat(id);
});

init();

</script>

</body>
</html>
