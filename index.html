<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI Chat</title>

<style>
body {
  margin: 0;
  font-family: system-ui, Arial;
  background: radial-gradient(circle at top, #0d0d0d99, #090909f1);
  color: white;
  height: 100vh;
  display: flex;
  overflow: hidden;
}

#sidebar {
  width: 210px;
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(10px);
  border-right: 1px solid rgba(255,255,255,0.08);
  display: flex;
  flex-direction: column;
}

#sidebarHeader {
  padding: 10px;
  font-size: 1.2em;
  font-weight: bold;
  text-align: center;
}

#chats {
  flex: 1;
  overflow-y: auto;
}

.chatItem {
  padding: 8px;
  cursor: pointer;
  font-size: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  display: flex;
  justify-content: space-between;
}

.chatItem.active {
  background: rgba(43,92,255,0.4);
}

#addChatBtn {
  margin: 8px;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #2b5cff;
  color: white;
  cursor: pointer;
}

#main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
}

.msg {
  display: block;
  width: fit-content;
  max-width: 70%;
  padding: 10px 14px;
  margin: 6px 0;
  border-radius: 12px;
  white-space: pre-wrap;
}

.user { margin-left: auto; background: #2b5cff; }
.ai { background: rgba(255,255,255,0.08); }

.fileBox {
  margin-top: 6px;
  padding: 6px;
  background: rgba(255,255,255,0.05);
  border-radius: 8px;
}

img.preview {
  max-width: 200px;
  border-radius: 10px;
}

#bar {
  display: flex;
  gap: 6px;
  padding: 8px;
  background: rgba(0,0,0,0.4);
}

input, select, button {
  height: 30px;
  border-radius: 8px;
  border: none;
  color: white;
}

input {
  flex: 1;
  background: rgba(255,255,255,0.08);
  padding: 0 8px;
}

button {
  background: #2b5cff;
  cursor: pointer;
}

a { color:#7aa2ff; }
pre { background:#00000055; padding:10px; border-radius:10px; }
code { background:#00000055; padding:2px 5px; border-radius:5px; }
#mode { background: #232323; color: white; border-radius: 8px; }
</style>
</head>

<body>

<div id="sidebar">
  <div id="sidebarHeader">Chats</div>
  <div style="border: 1px solid #c8c8c8;"></div>
  <div id="chats"></div>
  <button id="addChatBtn">+ New Chat</button>
</div>

<div id="main">
  <div id="chat"></div>

  <div id="bar">
    <select id="mode">
      <option value="lite">Lite</option>
      <option value="fast">Fast</option>
      <option value="pro">Pro</option>
      <option value="ultra">Ultra</option>
    </select>

    <input id="input" placeholder="Ask me anything...">

    <input type="file" id="fileInput" accept="image/*" multiple hidden>
    <button id="fileBtn">📎</button>
    <button id="micBtn">🎤</button>
    <button id="sendBtn">Send</button>
  </div>
</div>

<script>

const WORKER_URL = "https://ai.raybod8765.workers.dev";

let chats = JSON.parse(localStorage.getItem("chats") || "[]");
let currentChat = null;
let attachments = [];

/* SAVE */
function save() {
  localStorage.setItem("chats", JSON.stringify(chats));
}

/* CHAT */
function createChat() {
  const id = Date.now().toString();
  const chat = { id, title: "New Chat", messages: [] };
  chats.push(chat);
  save();
  return chat;
}

function switchChat(id) {
  currentChat = id;
  const chat = chats.find(c => c.id === id);

  const box = document.getElementById("chat");
  box.innerHTML = "";

  chat.messages.forEach(m => {
    const div = document.createElement("div");
    div.className = "msg " + m.role;
    div.innerHTML = md(m.text || "");

    if (m.files) div.appendChild(renderFiles(m.files));

    box.appendChild(div);
  });

  render();
  scrollBottom();
}

/* FILES */
document.getElementById("fileBtn").onclick = () =>
  document.getElementById("fileInput").click();

document.getElementById("fileInput").onchange = async (e) => {
  const files = [...e.target.files];

  attachments = await Promise.all(files.map(file =>
    new Promise(res => {
      const r = new FileReader();
      r.onload = () => res({
        name: file.name,
        type: file.type,
        data: r.result
      });
      r.readAsDataURL(file);
    })
  ));
};

function renderFiles(files) {
  const wrap = document.createElement("div");
  wrap.className = "fileBox";

  files.forEach(f => {
    if (f.type.startsWith("image/")) {
      const img = document.createElement("img");
      img.src = f.data;
      img.className = "preview";
      wrap.appendChild(img);
    } else {
      const d = document.createElement("div");
      d.textContent = f.name;
      wrap.appendChild(d);
    }
  });

  return wrap;
}

/* VOICE 🎤 */
const micBtn = document.getElementById("micBtn");

if ("webkitSpeechRecognition" in window) {
  const rec = new webkitSpeechRecognition();
  rec.continuous = false;
  rec.lang = "en-US";

  micBtn.onclick = () => rec.start();

  rec.onresult = (e) => {
    document.getElementById("input").value =
      e.results[0][0].transcript;
  };
}

/* MARKDOWN */
function md(text) {
  return String(text)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/```([\s\S]*?)```/g,'<pre><code>$1</code></pre>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>')
    .replace(/^###### (.*)$/gm,'<h6>$1</h6>')
    .replace(/^##### (.*)$/gm,'<h5>$1</h5>')
    .replace(/^#### (.*)$/gm,'<h4>$1</h4>')
    .replace(/^### (.*)$/gm,'<h3>$1</h3>')
    .replace(/^## (.*)$/gm,'<h2>$1</h2>')
    .replace(/^# (.*)$/gm,'<h1>$1</h1>')
    .replace(/\n/g,'<br>');
}

/* TYPE */
function typeMarkdown(el, text) {
  let i = 0, buf = "";

  function step() {
    if (i < text.length) {
      buf += text[i];
      el.innerHTML = md(buf);
      scrollBottom();
      i++;
      setTimeout(step, 6);
    } else {
      el.innerHTML = md(text);
    }
  }

  step();
}

/* SEND */
async function send() {

  const input = document.getElementById("input");
  const text = input.value.trim();
  const mode = document.getElementById("mode").value;

  if (!text && attachments.length === 0) return;
  input.value = "";

  if (!currentChat) createChat();

  const chat = chats.find(c => c.id === currentChat);

  chat.messages.push({ role:"user", text, files: attachments });

  const box = document.getElementById("chat");

  const u = document.createElement("div");
  u.className = "msg user";
  u.innerHTML = md(text);
  if (attachments.length) u.appendChild(renderFiles(attachments));
  box.appendChild(u);

  const ai = document.createElement("div");
  ai.className = "msg ai";
  ai.innerText = "•••";
  box.appendChild(ai);

  scrollBottom();

  const payload = {
    message: text,
    mode,
    files: attachments
  };

  attachments = [];

  const res = await fetch(WORKER_URL, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify(payload)
  });

  const data = await res.json();

  const reply = data.reply || "";

  typeMarkdown(ai, reply);

  chat.messages.push({ role:"ai", text: reply });

  save();
  render();
}

/* UI */
function render() {
  const box = document.getElementById("chats");
  box.innerHTML = "";

  chats.forEach(c => {
    const div = document.createElement("div");
    div.className = "chatItem" + (c.id===currentChat?" active":"");
    div.innerHTML = `<span>${c.title}</span>`;
    div.onclick = () => switchChat(c.id);
    box.appendChild(div);
  });
}

function scrollBottom() {
  const c = document.getElementById("chat");
  c.scrollTop = c.scrollHeight;
}

/* EVENTS */
document.getElementById("sendBtn").onclick = send;
document.getElementById("input").onkeydown = e => {
  if (e.key === "Enter") send();
};

document.getElementById("addChatBtn").onclick = () => {
  const c = createChat();
  switchChat(c.id);
};

/* INIT */
if (chats.length) switchChat(chats[0].id);
else switchChat(createChat().id);

</script>

</body>
</html>
