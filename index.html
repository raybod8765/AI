<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>AI Chat</title> <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script> <style> body { margin: 0; font-family: system-ui, Arial; background: radial-gradient(circle at top, #0d0d0d99, #090909f1); color: white; height: 100vh; display: flex; overflow: hidden; } #sidebar { width: 210px; background: rgba(0,0,0,0.45); backdrop-filter: blur(10px); border-right: 1px solid rgba(255,255,255,0.08); display: flex; flex-direction: column; } #sidebarHeader { padding: 10px; font-size: 1.1em; font-weight: bold; text-align: center; } #chats { flex: 1; overflow-y: auto; } .chatItem { padding: 6px 12px; cursor: pointer; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.05); } .chatItem.active { background: rgba(43,92,255,0.4); } #addChatBtn { margin: 8px; padding: 6px; border: none; border-radius: 6px; background: #2b5cff; color: white; cursor: pointer; font-weight: bold; } #main { flex: 1; display: flex; flex-direction: column; } #chat { flex: 1; overflow-y: auto; padding: 10px; } .msg { width: fit-content; max-width: 85%; padding: 6px 10px; margin: 6px 0; border-radius: 8px; line-height: 1.4; font-size: 14px; } .user { margin-left: auto; background: #2b5cff; } .ai { background: rgba(255,255,255,0.08); } #bar { display: flex; gap: 8px; padding: 10px; background: rgba(0,0,0,0.4); align-items: center; } #model-select { height: 32px; border-radius: 6px; background: rgba(255,255,255,0.1); color: white; border: none; padding: 0 8px; cursor: pointer; } input { height: 32px; border-radius: 6px; border: none; color: white; flex: 1; background: rgba(255,255,255,0.08); padding: 0 10px; } button#sendBtn { height: 32px; border-radius: 6px; border: none; color: white; background: #2b5cff; cursor: pointer; padding: 0 12px; } </style> </head> <body> <div id="sidebar"> <div id="sidebarHeader">Your Chats</div> <div id="chats"></div> <button id="addChatBtn">+ New Chat</button> </div> <div id="main"> <div id="chat"></div> <div id="bar"> <select id="model-select"> <option value="fast">Fast</option> <option value="pro">Pro</option> <option value="ultra">Ultra</option> </select> <input id="input" placeholder="Ask me anything..."> <button id="sendBtn">Send</button> </div> </div> <script> const WORKER_URL = "https://ai.raybod8765.workers.dev"; let chats = JSON.parse(localStorage.getItem("chats") || "[]"); let currentChat = null; function save() { localStorage.setItem("chats", JSON.stringify(chats)); } function renderChats() { const el = document.getElementById("chats"); el.innerHTML = ""; chats.forEach(c => { const div = document.createElement("div"); div.className = "chatItem" + (c.id === currentChat ? " active" : ""); div.innerHTML = marked.parse(c.title); div.onclick = () => openChat(c.id); el.appendChild(div); }); } function openChat(id) { currentChat = id; renderChats(); renderMessages(); } async function typeText(element, text) { element.innerHTML = ""; for (let i = 0; i < text.length; i++) { element.innerHTML = marked.parse(text.substring(0, i + 1)); document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight; await new Promise(r => setTimeout(r, 22)); } } function renderMessages() { const chatEl = document.getElementById("chat"); chatEl.innerHTML = ""; const chat = chats.find(c => c.id === currentChat); if (!chat) return; chat.messages.forEach(m => { const div = document.createElement("div"); div.className = "msg " + (m.role === "user" ? "user" : "ai"); div.innerHTML = marked.parse(m.text); chatEl.appendChild(div); }); chatEl.scrollTop = chatEl.scrollHeight; } async function send() { const input = document.getElementById("input"); const text = input.value.trim(); const mode = document.getElementById("model-select").value; if (!text) return; input.value = ""; if (!currentChat) { currentChat = Date.now().toString(); chats.push({ id: currentChat, title: "New Chat", messages: [] }); } let chat = chats.find(c => c.id === currentChat); chat.messages.push({ role: "user", text }); renderMessages(); renderChats(); const aiDiv = document.createElement("div"); aiDiv.className = "msg ai"; aiDiv.innerText = "..."; document.getElementById("chat").appendChild(aiDiv); document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight; try { const res = await fetch(WORKER_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ message: text, mode }) }); const data = await res.json(); chat.messages.push({ role: "ai", text: data.reply }); if (chat.messages.length === 2 && mode !== "lite") { const titleRes = await fetch(WORKER_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ message: `Short title for: ${text}`, mode }) }); const t = await titleRes.json(); chat.title = t.reply.replace(/['"]+/g, ''); } save(); renderChats(); await typeText(aiDiv, data.reply); } catch (err) { aiDiv.innerText = "Error: Could not reach the AI."; } } document.getElementById("sendBtn").onclick = send; document.getElementById("input").onkeydown = e => { if (e.key === "Enter") send(); }; document.getElementById("addChatBtn").onclick = () => { currentChat = null; document.getElementById("chat").innerHTML = ""; renderChats(); }; if (chats.length > 0) openChat(chats[0].id); </script> </body> </html>
